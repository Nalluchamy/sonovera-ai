
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

  .logo-wrap {
    background: #030810;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px 36px;
    overflow: hidden;
    position: relative;
  }

  .logo-wrap svg { display: block; }

  @keyframes pulse-ring {
    0%   { opacity: 0.6; r: 88; }
    50%  { opacity: 0.15; r: 108; }
    100% { opacity: 0.6; r: 88; }
  }
  @keyframes pulse-ring2 {
    0%   { opacity: 0.3; r: 108; }
    50%  { opacity: 0.08; r: 128; }
    100% { opacity: 0.3; r: 108; }
  }
  @keyframes mic-glow {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.55; }
  }
  @keyframes wave-bar {
    0%,100% { transform: scaleY(0.3); opacity: 0.4; }
    50%      { transform: scaleY(1);   opacity: 1; }
  }
  @keyframes circuit-flow {
    0%   { stroke-dashoffset: 200; opacity: 0.2; }
    50%  { opacity: 1; }
    100% { stroke-dashoffset: 0;   opacity: 0.2; }
  }
  @keyframes dot-blink {
    0%,100% { opacity: 1;   r: 3; }
    50%      { opacity: 0.3; r: 2; }
  }
  @keyframes scanline {
    0%   { transform: translateY(-140px); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(140px); opacity: 0; }
  }
  @keyframes title-flicker {
    0%,96%,100% { opacity: 1; }
    97%          { opacity: 0.7; }
    98%          { opacity: 1; }
    99%          { opacity: 0.85; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes rotate-slow {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes dash-flow {
    to { stroke-dashoffset: -40; }
  }

  .ring1 { animation: pulse-ring  2.8s ease-in-out infinite; transform-origin: 340px 175px; }
  .ring2 { animation: pulse-ring2 2.8s ease-in-out infinite 0.4s; transform-origin: 340px 175px; }
  .mic-body { animation: mic-glow 2.5s ease-in-out infinite; }

  .wb { transform-origin: center bottom; animation: wave-bar 1.2s ease-in-out infinite; }
  .wb1  { animation-delay: 0s; }
  .wb2  { animation-delay: .09s; }
  .wb3  { animation-delay: .18s; }
  .wb4  { animation-delay: .27s; }
  .wb5  { animation-delay: .36s; }
  .wb6  { animation-delay: .45s; }
  .wb7  { animation-delay: .54s; }
  .wb8  { animation-delay: .63s; }
  .wb9  { animation-delay: .72s; }
  .wb10 { animation-delay: .81s; }
  .wb11 { animation-delay: .90s; }
  .wb12 { animation-delay: .99s; }

  .cflow { stroke-dasharray: 200; animation: circuit-flow 2.2s linear infinite; }
  .cflow2{ stroke-dasharray: 200; animation: circuit-flow 2.2s linear infinite 0.6s; }
  .cflow3{ stroke-dasharray: 200; animation: circuit-flow 2.2s linear infinite 1.2s; }
  .cflow4{ stroke-dasharray: 200; animation: circuit-flow 2.2s linear infinite 1.8s; }

  .d1 { animation: dot-blink 1.4s ease-in-out infinite; transform-origin: center; }
  .d2 { animation: dot-blink 1.4s ease-in-out infinite 0.35s; }
  .d3 { animation: dot-blink 1.4s ease-in-out infinite 0.7s; }
  .d4 { animation: dot-blink 1.4s ease-in-out infinite 1.05s; }

  .scanline { animation: scanline 3.5s ease-in-out infinite; }
  .title-txt { animation: title-flicker 6s ease-in-out infinite 2s; }
  .sub-txt   { animation: fadeIn 1.2s ease both 0.6s; opacity: 0; }
  .tag-txt   { animation: fadeIn 1.2s ease both 1.1s; opacity: 0; }

  .orbit-ring { animation: rotate-slow 12s linear infinite; transform-origin: 340px 175px; }
  .dash-anim  { stroke-dasharray: 8 6; animation: dash-flow 1.2s linear infinite; }
</style>
